cv:
  name: Kidanemaryam Wagaw Reta
  label: Plant Physiologist | Plant Biochemist | Predictive Modeling | Systems Crop Scientist
  email: kidane.et@gmail.com
  #phone: "+972587964242"
  location: Be'er Sheva, Israel
  image: ""
  summary: Plant scientist with a PhD in plant biotechnology, specializing in crop physiology, plant metabolism, trait characterization under complex abiotic stresses, multi-omics integration, and predictive modeling for climate-resilient crop performance.

  social_networks:
    - network: LinkedIn
      username: kidanemaryam-wagaw-reta

  sections:
    Education:
      - institution: Ben-Gurion University of the Negev
        location: Be'er Sheva, Israel
        area: Plant Metabolomics
        studyType: PhD
        start_date: 2021-10
        end_date: 2025-11
        highlights:
          - "Thesis: Responses of Vitis vinifera grafts to combined abiotic stress: Physiology and Metabolism."
          - Designed and executed multi-season experiments across field, greenhouse, and semi-controlled systems to quantify grapevine responses to combined salinity, heatwave, and water stress.
          - Integrated physiology with metabolomics, transcriptomics, ionomics, phenomics, and root-shoot phenotyping to identify mechanisms and traits associated with stress resilience.
          - Developed predictive and network-based analyses linking environmental variables, physiological traits, molecular responses, and crop performance.

      - institution: Jimma University
        location: Ethiopia
        area: Plant Breeding
        studyType: MSc
        start_date: 2016-10
        end_date: 2018-10
        highlights:
          - "Thesis: Assessment of heterotic performance and combining ability of Ethiopian elite sorghum (Sorghum bicolor (L.) Moench) lines."
          - Designed field-based experiments for hybrid sorghum development and evaluated heterosis, combining ability, stability, and genotype-by-environment interactions.

      - institution: Haramaya University
        location: Ethiopia
        area: Plant Sciences
        studyType: BSc, Great Distinction
        start_date: 2009-09
        end_date: 2012-07

    Experience:
      - company: Ben-Gurion University of the Negev
        position: Postdoctoral Researcher in Plant Metabolomics and Physiology
        location: Be'er Sheva, Israel
        start_date: 2025-11
        end_date: Present
        highlights:
          - Lead an OIV-funded integrative phenotyping project combining UAV-based thermal imaging, physiology, metabolomics, gene expression, and AI-assisted predictive modeling to identify climate-resilient varietal performance.
          - Design above- and below-ground crop physiology experiments using gas exchange, chlorophyll fluorescence, ionomics, plant biochemistry, and multi-year field and controlled-environment phenotyping.
          - Generate and analyze metabolomics and volatilomics datasets using GC-MS, LC-MS, HS-SPME-GC-MS, multivariate statistics, network analysis, and machine learning.
          - Integrate multi-omics datasets to resolve carbon metabolism, ion partitioning, root-zone processes, and biochemical regulation underlying abiotic stress responses.

      - company: Bio and Emerging Technology Institute
        position: Researcher II, Plant Molecular Breeder
        location: Addis Ababa, Ethiopia
        start_date: 2021-02
        end_date: Present
        highlights:
          - Led crop improvement research for dryland production systems, integrating physiological phenotyping, quantitative genetics, molecular tools, and stress-resilient trait validation.
          - Applied genomic-assisted selection and molecular breeding approaches to accelerate selection and deployment of improved crop varieties.
          - Coordinated multi-institutional, internationally funded research programs including BIOINNOVATE Africa.

      - company: Ethiopian Institute of Agricultural Research
        position: Junior Researcher to Associate Researcher, Plant Breeder
        location: Addis Ababa, Ethiopia
        start_date: 2014-05
        end_date: 2021-01
        highlights:
          - Designed and implemented breeding schemes, crossing, hybridization, and heterosis exploitation that led to three improved sorghum varieties and contributed to eight more released varieties as part of a team.
          - Led large-scale phenotyping and physiological characterization of sorghum germplasm across multi-environment trials.
          - Integrated field phenotyping, SNP-based genotyping, genotype-phenotype association analysis, and data-driven selection pipelines.

      - company: Amhara Bureau of Agriculture, Amhara Sayint Agricultural Office
        position: Crop Production and Protection Expert, System Agronomist
        location: Amhara Sayint, Ethiopia
        start_date: 2012-10
        end_date: 2014-04
        highlights:
          - Provided field-level agronomic diagnostics and advisory support for maize, wheat, barley, and haricot bean production.
          - Conducted seed quality assessment and certification for haricot bean production systems targeting local and export markets.

    Interests:
      - name: Crop stress physiology
        keywords: [Photosynthesis, gas exchange, chlorophyll fluorescence, heatwave stress, salinity, water deficit, stress thresholds]
      - name: Plant metabolomics and multi-omics
        keywords: [GC-MS, LC-MS, ionomics, transcriptomics, phenomics, metabolic network analysis, pathway analysis]
      - name: Root-shoot interactions
        keywords: [Root system architecture, ion selectivity, rootstock-mediated traits, plant-soil interactions, belowground phenotyping]
      - name: Predictive crop performance
        keywords: [Machine learning, UAV thermal sensing, high-throughput phenotyping, AI-assisted forecasting, climate resilience]

